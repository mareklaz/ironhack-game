<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ironhack Platform</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    
    <div class="container">
        
        <canvas id="canvas" class="canvas" width="1280" height="960"></canvas>
        <div class="title" id="titleScreen">
            <h1>Ironhack Pirates Adventure</h1>
            <div class="help">
                <div>
                    <img src="./assets/img/help1.png" alt="">
                    <p>Press 'Space' to Jump</p>
                </div>
                <div>
                    <img src="./assets/img/help2.png" alt="">
                    <p>Press 'A' to move left or 'D' to move right</p>
                </div>
                <div>
                    <img src="./assets/img/help3.png" alt="">
                    <p>Press 'Q' or 'Shift' to throw knives</p>
                </div>                
            </div>
            <button id="startBtn" class="start-btn">Start</button>
        </div>
        <button id="restartBtn" class="restart-btn" onclick="window.location.reload()">Restart</button>
    </div>



    <script src="js/constants.js"></script>
    <script src="js/sword.js"></script>
    <script src="js/weapon.js"></script>
    <script src="js/gui.js"></script>
    <script src="js/graphics.js"></script>
    <script src="js/treasures.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/crab.js"></script>
    <script src="js/player.js"></script>
    <script src="js/platform.js"></script>
    <script src="js/level.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
